name: Release

# Push a version tag (vX.Y.Z matching package.json) to create a GitHub Release
# and publish the package to npm.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release + npm publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag v${tag} does not match package.json version ${version}"
            exit 1
          fi
          echo "Releasing ${version}"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Syntax-check published entrypoints
        run: |
          node --check dist/main.js
          node --check dist/acp-server.js
          node --check dist/cli.js

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            echo "No CHANGELOG section for ${version}; using generated notes." > "$notes_file"
          fi
          echo "path=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "${GITHUB_REF_NAME#v}" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            --verify-tag

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

name: Release

# Push a version tag (vX.Y.Z matching package.json) to create a GitHub Release
# and publish the package to npm via Trusted Publishing (OIDC) — only if the
# tagged commit is already on main.
#
# Configure the matching Trusted Publisher on npmjs.com for this repo and
# workflow file (`.github/workflows/release.yml`). No long-lived NPM_TOKEN.
#
# Stable:     v1.2.3           → GitHub Release + npm --tag latest
# Pre-release: v1.0.0-alpha.0  → GitHub pre-release + npm --tag alpha
#              v1.0.0-beta.1   → GitHub pre-release + npm --tag beta
#              v1.0.0-rc.1     → GitHub pre-release + npm --tag rc
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Required for npm Trusted Publishing (OIDC).
  id-token: write

jobs:
  release:
    name: GitHub Release + npm publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so we can verify the tag is an ancestor of main.
          fetch-depth: 0

      - name: Require tagged commit is on main
        run: |
          set -euo pipefail
          git fetch origin main
          tag_sha="$(git rev-parse "${GITHUB_REF_NAME}^{}")"
          main_sha="$(git rev-parse origin/main)"
          echo "Tag ${GITHUB_REF_NAME} → ${tag_sha}"
          echo "origin/main         → ${main_sha}"

          # A commit is "on main" if it is origin/main or an ancestor of it.
          if ! git merge-base --is-ancestor "$tag_sha" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points to ${tag_sha}, which is not on origin/main."
            echo "Merge the release commit into main first, then tag and push the tag."
            exit 1
          fi
          echo "OK: tagged commit is on main"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing needs a recent npm with OIDC support.
      - name: Install npm with OIDC support
        run: npm install -g npm@11

      - name: Verify tag matches package.json and detect channel
        id: version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag v${tag} does not match package.json version ${version}"
            exit 1
          fi

          # SemVer pre-release: anything after the first hyphen (e.g. alpha.0).
          if [[ "$version" == *-* ]]; then
            pre="${version#*-}"
            # npm dist-tag from the pre-release id: alpha.0 → alpha, beta.1 → beta
            npm_tag="${pre%%.*}"
            if [[ ! "$npm_tag" =~ ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ ]]; then
              echo "::error::Cannot derive a valid npm dist-tag from pre-release '${pre}'"
              exit 1
            fi
            prerelease=true
          else
            npm_tag=latest
            prerelease=false
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${npm_tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${version} (prerelease=${prerelease}, npm tag=${npm_tag})"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Syntax-check published entrypoints
        run: |
          node --check dist/main.js
          node --check dist/acp-server.js
          node --check dist/cli.js

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${{ steps.version.outputs.version }}"
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            echo "No CHANGELOG section for ${version}; using generated notes." > "$notes_file"
          fi
          echo "path=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists; leaving it in place."
            exit 0
          fi
          args=(
            "$GITHUB_REF_NAME"
            --title "${{ steps.version.outputs.version }}"
            --notes-file "${{ steps.notes.outputs.path }}"
            --verify-tag
          )
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"

      # No NODE_AUTH_TOKEN / NPM_TOKEN: npm exchanges the Actions OIDC token
      # for a short-lived publish credential via Trusted Publishing.
      - name: Publish to npm (Trusted Publisher)
        run: |
          npm publish --access public --tag "${{ steps.version.outputs.npm_tag }}" --provenance
